<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orang Paling Ganteng</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&amp;family=Nunito:wght@700;900&amp;display=swap" rel="stylesheet">
  <style>
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes popIn { 0%{transform:scale(0) rotate(-20deg);opacity:0} 60%{transform:scale(1.2) rotate(5deg);opacity:1} 100%{transform:scale(1) rotate(0)} }
    @keyframes rain { 0%{transform:translateY(-40px);opacity:0} 20%{opacity:1} 100%{transform:translateY(110%);opacity:0} }
    @keyframes glow { 0%,100%{box-shadow:0 0 20px rgba(255,215,0,.4)} 50%{box-shadow:0 0 50px rgba(255,215,0,.8)} }
    .float{animation:float 3s ease-in-out infinite}
    .pop-in{animation:popIn .5s cubic-bezier(.17,.67,.35,1.4) forwards}
    .emoji-rain{position:absolute;font-size:2rem;animation:rain 3s linear infinite;pointer-events:none}
    .photo-glow{animation:glow 2s ease-in-out infinite}
  </style>
  <script>
    const defaultConfig = {
      main_title: "Siapa orang paling ganteng di dunia?",
      button_text: "KLIK UNTUK TAHU! 👆",
      bg_color: "#0f0a2e",
      surface_color: "#1a1145",
      text_color: "#ffd700",
      primary_action: "#ff3c78",
      secondary_action: "#7c3aed"
    };

    function applyConfig(config) {
      const t = k => config[k] || defaultConfig[k];
      document.body.style.background = t('bg_color');
      const title = document.getElementById('main-title');
      const btn = document.getElementById('reveal-btn');
      const revealBg = document.getElementById('reveal-bg');
      if (title) { title.textContent = t('main_title'); title.style.color = t('text_color'); }
      if (btn) { btn.textContent = t('button_text'); btn.style.background = `linear-gradient(135deg, ${t('primary_action')}, ${t('secondary_action')})`; }
      if (revealBg) revealBg.style.background = t('bg_color');
      document.querySelectorAll('.surface-card').forEach(el => el.style.background = t('surface_color'));
    }

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => applyConfig(config),
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.bg_color || defaultConfig.bg_color, set: v => { config.bg_color = v; window.elementSdk.setConfig({ bg_color: v }); } },
          { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.primary_action || defaultConfig.primary_action, set: v => { config.primary_action = v; window.elementSdk.setConfig({ primary_action: v }); } },
          { get: () => config.secondary_action || defaultConfig.secondary_action, set: v => { config.secondary_action = v; window.elementSdk.setConfig({ secondary_action: v }); } }
        ],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      }),
      mapToEditPanelValues: (config) => new Map([
        ["main_title", config.main_title || defaultConfig.main_title],
        ["button_text", config.button_text || defaultConfig.button_text]
      ])
    });
  </script>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full w-full overflow-auto" style="background:#0f0a2e;margin:0;font-family:'Nunito',sans-serif"><!-- Question Page -->
  <div id="question-page" class="h-full w-full flex flex-col items-center justify-center px-4 text-center">
   <div class="float mb-8 text-6xl">
    🤔
   </div>
   <h1 id="main-title" class="text-3xl md:text-5xl font-black mb-10 leading-tight" style="font-family:'Righteous',cursive;color:#ffd700;text-shadow:0 0 30px rgba(255,215,0,.3)">Siapa orang paling ganteng di dunia?</h1><button id="reveal-btn" onclick="reveal()" class="text-white text-xl md:text-2xl font-black px-10 py-5 rounded-2xl cursor-pointer border-none transition-transform hover:scale-110 active:scale-95" style="background:linear-gradient(135deg,#ff3c78,#7c3aed);box-shadow:0 8px 32px rgba(255,60,120,.4)"> KLIK UNTUK TAHU! 👆 </button>
  </div><!-- Reveal Page -->
  <div id="reveal-page" class="h-full w-full fixed inset-0 flex flex-col items-center justify-center px-4" style="display:none;z-index:50">
   <div id="reveal-bg" class="absolute inset-0" style="background:#0f0a2e"></div>
   <div id="emoji-container" class="absolute inset-0 overflow-hidden pointer-events-none"></div>
   <div class="relative z-10 flex flex-col items-center">
    <p id="king-text" class="text-5xl md:text-7xl font-black text-center pop-in mb-6" style="color:#ffd700;font-family:'Righteous',cursive;text-shadow:0 0 30px rgba(255,215,0,.6);opacity:0;letter-spacing:2px">KING UQONNN</p>
    <div id="photo-frame" class="pop-in photo-glow rounded-3xl overflow-hidden mb-6 border-4" style="border-color:#ffd700;opacity:0"><img src="https://i.postimg.cc/fbC3SXKN/Picsart-.jpg" alt="Orang paling ganteng" loading="lazy" class="w-80 h-80 md:w-96 md:h-96 object-cover" onerror="console.error('Image failed:',this.src);this.style.background='linear-gradient(135deg,#ffd700,#ff3c78)';this.alt='Foto tidak tersedia';this.style.display='flex';">
    </div>
    <p id="reveal-text" class="text-2xl md:text-4xl font-black text-center pop-in" style="color:#ffd700;font-family:'Righteous',cursive;text-shadow:0 0 20px rgba(255,215,0,.5);opacity:0">INI DIA ORANGNYA! 👑✨</p>
   </div>
  </div>
  <script>
    function reveal() {
      document.getElementById('question-page').style.display = 'none';
      const rp = document.getElementById('reveal-page');
      rp.style.display = 'flex';

      // Start emoji rain
      const container = document.getElementById('emoji-container');
      for (let i = 0; i < 60; i++) {
        const span = document.createElement('span');
        span.className = 'emoji-rain';
        span.textContent = '💦';
        span.style.left = Math.random() * 100 + '%';
        span.style.animationDelay = Math.random() * 4 + 's';
        span.style.animationDuration = (2 + Math.random() * 3) + 's';
        span.style.fontSize = (1.2 + Math.random() * 1.5) + 'rem';
        container.appendChild(span);
      }

      // Animate photo and text
      setTimeout(() => { document.getElementById('king-text').style.opacity = '1'; }, 100);
      setTimeout(() => { document.getElementById('photo-frame').style.opacity = '1'; }, 300);
      setTimeout(() => { document.getElementById('reveal-text').style.opacity = '1'; }, 700);
    }
  </script>

</html>
